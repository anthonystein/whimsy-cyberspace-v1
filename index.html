<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#f2f3f5" />
    <title>Whimsy Cyberspace</title>
    <meta
      name="description"
      content="Whimsy Cyberspace: Broadway, Administrative, YouTube, Human Texture."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body data-hush="false">
    <div class="grain" aria-hidden="true"></div>

    <header class="topbar" role="banner">
      <div class="mark" aria-label="Site mark">
        <!-- Logo is back -->
        <img
          class="logo"
          src="/assets/Whimsy Cyberspace Cross Heading.png"
          alt="Whimsy Cyberspace mark"
        />

        <div class="brandText">
          <!-- Purple box requirement: Whimsy Cyberspace on top, David Bacchus underneath -->
          <div class="brandName">WHIMSY CYBERSPACE</div>
          <div class="brandSub">david bacchus</div>
        </div>
      </div>

      <div class="topbarRight">
        <button
          id="toggleHush"
          class="quiet"
          type="button"
          aria-label="Toggle hush mode"
        >
          hush
        </button>
      </div>
    </header>

    <main class="world" role="main">
      <section class="threshold" aria-label="Threshold">
        <h1 class="anchorLine">Enter by weight.</h1>
        <p class="subLine">
          Four rooms. One identity. Different depth.
          <span class="soft">Tap or press Enter to step in.</span>
        </p>
        <div id="microHint" class="microHint" aria-label="Interaction hint">
          <span class="microKey">enter</span> to step in ·
          <span class="microKey">enter</span> again to cycle ·
          <span class="microKey">esc</span> to exit
        </div>
      </section>

      <section id="field" class="field" aria-label="Room field"></section>
    </main>

    <section
      id="overlay"
      class="overlay"
      data-open="false"
      aria-hidden="true"
      aria-label="Room overlay"
    >
      <div
        class="overlayCard"
        role="dialog"
        aria-modal="true"
        aria-label="Room"
      >
        <div class="overlayTop">
          <div class="overlayNameWrap">
            <div id="overlayName" class="overlayName">ROOM</div>
            <div id="overlayMeta" class="overlayMeta"></div>
          </div>
          <button
            id="closeOverlay"
            class="close"
            type="button"
            aria-label="Close room"
          >
            close
          </button>
        </div>

        <div id="overlayBody" class="overlayBody"></div>

        <div class="overlayFoot">
          <div class="sig">DB</div>
          <div class="footnote">Esc closes. Enter cycles.</div>
        </div>
      </div>
    </section>

    <script src="./main.js" defer></script>
  </body>
</html>
